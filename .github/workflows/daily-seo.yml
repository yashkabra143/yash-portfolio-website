name: Daily SEO Maintenance

on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST (UTC+5:30)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sitemap lastmod to today
        id: sitemap
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "date=${TODAY}" >> $GITHUB_OUTPUT
          sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>${TODAY}</lastmod>|g" \
            client/public/sitemap.xml
          if git diff --quiet client/public/sitemap.xml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push sitemap update
        if: steps.sitemap.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/sitemap.xml
          git commit -m "chore(seo): update sitemap lastmod to ${{ steps.sitemap.outputs.date }} [skip ci]"
          git push

      - name: Ping Google to re-crawl sitemap
        id: ping
        continue-on-error: true
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=https://www.iamyashkabra.com/sitemap.xml")
          echo "status=${HTTP_STATUS}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        if: always()
        with:
          node-version: '20'

      - name: Send SEO status email
        if: always()
        run: node scripts/send-seo-email.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITEMAP_CHANGED: ${{ steps.sitemap.outputs.changed }}
          SITEMAP_DATE: ${{ steps.sitemap.outputs.date }}
          PING_STATUS: ${{ steps.ping.outputs.status }}
