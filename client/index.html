    <!-- n8n Chat Widget with Enhanced Configuration and Error Handling -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <script>
      // Fix for "body stream already read" error
      const originalFetch = window.fetch;
      window.fetch = async function(...args) {
        try {
          const response = await originalFetch.apply(this, args);

          // If the response is for the chat webhook, add special handling
          const url = args[0];
          if (typeof url === 'string' && url.includes('webhook')) {
            // Clone the response to prevent body stream issues
            return response.clone();
          }

          return response;
        } catch (error) {
          // If it's a body stream error, retry once
          if (error.message && error.message.includes('body stream already read')) {
            console.warn('Body stream error detected, retrying...', error);
            try {
              return await originalFetch.apply(this, args);
            } catch (retryError) {
              console.error('Retry failed:', retryError);
              throw retryError;
            }
          }
          throw error;
        }
      };
    </script>

    <!-- Click Outside Detection and Auto-Hide -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        let chatWindow = null;
        let chatButton = null;
        const checkInterval = setInterval(() => {
          chatWindow = document.querySelector('#n8n-chat .chat-window');
          chatButton = document.querySelector('#n8n-chat .chat-bubble-button');

          if (chatWindow && chatButton) {
            clearInterval(checkInterval);
            console.log('Chat widget initialized successfully');

            // Add click outside detection
            document.addEventListener('click', function(event) {
              const isClickInsideChat = chatWindow.contains(event.target);
              const isClickOnButton = chatButton.contains(event.target);

              // If chat window is visible and click is outside both button and window
              if (!isClickInsideChat && !isClickOnButton && chatWindow.style.display !== 'none') {
                // Close the chat window
                if (chatButton.getAttribute('data-open') === 'true') {
                  chatButton.click();
                }
              }
            });
          }
        }, 100);

        // Cleanup interval after 10 seconds if not found
        setTimeout(() => {
          clearInterval(checkInterval);
          console.log('Chat widget search completed');
        }, 10000);
      });

      // Global error handler for chat-related errors
      window.addEventListener('error', (event) => {
        if (event.message && event.message.includes('body stream')) {
          console.warn('Chat body stream error (non-blocking):', event.message);
          event.preventDefault();
        }
      });

      // Handle unhandled promise rejections from chat
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason && event.reason.message && event.reason.message.includes('body stream')) {
          console.warn('Chat body stream promise rejection (non-blocking):', event.reason.message);
          event.preventDefault();
        }
      });
    </script>
